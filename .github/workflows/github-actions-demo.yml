name: App Deployment Workflow

run-name: Build and upload new app version

on: [push]

env:
  IEM_URL: "https://192.168.30.4"
  IEM_USER: "johannes.frisch@siemens.com"
  
jobs:
  App-Deployment-Pipeline:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Build Step
        run: |
          echo "Start building the application"
          cd app
          docker compose build
          docker images
          cd ..
      - name: Upload Step
        run: |
          echo "Initialize IECTL"

          # set enviroment variables
          export IE_SKIP_CERTIFICATE=true
          export EDGE_SKIP_TLS=1

          # create workspace
          rm -rf workspace
          mkdir workspace
          cd workspace
          iectl publisher workspace init
          cd ..

      - run: echo "App deploymemt complete"
