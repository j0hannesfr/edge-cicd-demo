name: App Deployment Workflow
run-name: Build and upload new app version
on: [push]
jobs:
  App-Deployment-Pipeline:
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Build Step
        run: |
          echo "Start building the application"
          cd app
          ls -la
          docker compose build
          docker images
          cd ..
      - run: echo "Start uploading the application"
      - run: echo "App deploymemt complete"
